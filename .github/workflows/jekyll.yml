# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Build Dart React app
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Build Dart React App
        run: |
          cd site/assets/js/repos
          dart pub get
          dart analyze
          dart compile js web/app.dart -o ../repos.js -O2

      # Build Jekyll
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          # sass-embedded / google-protobuf / ffi ship PRECOMPILED gems for the
          # libc-specific platform x86_64-linux-gnu. Selecting them (instead of
          # building from source, which fails on the runner) needs libc-aware
          # platform matching: RubyGems >= 3.5 AND Bundler >= 2.5. Ruby 3.1 ships
          # RubyGems 3.3.7 + Bundler 2.4.2 (both too old), so we upgrade both.
          # They are co-released; the bundler version must match BUNDLED WITH in
          # Gemfile.lock so bundler does not self-switch back to 2.4.2.
          rubygems: '3.5.23'
          bundler: '2.5.23'
          bundler-cache: true
          cache-version: 2
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        run: cd site && bundle install && bundle exec jekyll build --destination ../_site/ --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
