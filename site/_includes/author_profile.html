{% assign author_data = include.author_data %}
<div class="wrapper gray-wrapper">
  <div class="container inner">
    <div class="row">
      <div class="col-lg-10 offset-lg-1">
        <div class="row align-items-center">
          {% if author_data.image %}
          <div class="col-md-4">
            <figure class="rounded">
              <a href="/authors/{{ author_data.title | slugify }}">
                <img alt="{{ author_data.title }}" src="{{ author_data.image }}" />
              </a>
            </figure>
          </div>
          {% endif %}
          <div class="col-md-8">
            <h4>{{ author_data.title }}</h4>
            {% if author_data.bio %}
            <p class="mb-10">{{ author_data.bio }}</p>
            {% endif %}
            {% if author_data.social_accounts %}
            <ul class="social">
              {% for author_social in author_data.social_accounts %}
              <li><a href="{{ author_social.url }}"><i class="{{ author_social.icon }}"></i></a></li>
              {% endfor %}
            </ul>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
